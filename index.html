<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Visitly</title>

  <link rel="stylesheet" href="./style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="page">

    <!-- LOGO -->
    <div class="logo">
      <img src="./assets/visitly-logo.png" alt="Visitly" class="logo-img">
    </div>

    <!-- HERO -->
    <div class="hero">
      <h1 class="hero-title">Every visit counts.</h1>
      <p class="hero-desc">
        Discover top-rated businesses, track your rewards, and never lose a loyalty card again.
        <br>Be the first to experience Visitly — secure your spot on the list.
      </p>
    </div>

    <div class="divider"></div>

    <!-- WAITLIST FORM -->
    <div class="waitlist-wrap">
      <p class="waitlist-label">Join the waitlist!</p>

      <div class="input-group">

        <!-- Contact type -->
        <div class="select-wrap">
          <select class="contact-select" id="contactType" onchange="updateInput()">
            <option value="instagram">Instagram</option>
            <option value="email">E-mail</option>
            <option value="phone">Phone</option>
          </select>
          <svg class="select-arrow" width="10" height="6" viewBox="0 0 10 6" fill="none">
            <path d="M1 1L5 5L9 1" stroke="#7B7B7A" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>

        <!-- Country prefix (phone only) -->
        <div class="phone-prefix-wrap" id="phonePrefixWrap">
          <button class="country-btn" id="countryBtn" type="button" onclick="toggleDropdown()">
            <span class="country-flag" id="selectedFlag">🇨🇿</span>
            <span class="country-dial" id="selectedDial">+420</span>
            <svg class="country-chevron" width="10" height="6" viewBox="0 0 10 6" fill="none">
              <path d="M1 1L5 5L9 1" stroke="#7B7B7A" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
          <div class="country-dropdown" id="countryDropdown">
            <input class="country-search" type="text" placeholder="Search country..." oninput="filterCountries(this.value)" autocomplete="off"/>
            <div class="country-list" id="countryList"></div>
          </div>
        </div>

        <input class="contact-input" type="text" id="contactInput" value="@" autocomplete="off"/>
        <button class="submit-btn" onclick="handleSubmit()">Submit →</button>
      </div>

      <button class="submit-btn-mobile" onclick="handleSubmit()">Submit →</button>

      <p class="form-hint" id="formHint">Please select your preferred contact.</p>
      <div class="success-msg" id="successMsg">✦ &nbsp;You have successfully joined the waitlist.</div>
    </div>

    <div class="phone-app">
      <img src="./assets/phone-app.png" alt="phone-app" class="phone-app-img">
    </div>

    <footer class="footer">
      <p>&copy; 2026 Visitly.</p>
    </footer>

  </div>
  <script>
    const countries = [
      { flag:'🇨🇿', name:'Czech Republic', dial:'+420' },
      { flag:'🇸🇰', name:'Slovakia', dial:'+421' },
      { flag:'🇩🇪', name:'Germany', dial:'+49'  },
      { flag:'🇦🇹', name:'Austria', dial:'+43'  },
      { flag:'🇵🇱', name:'Poland', dial:'+48'  },
      { flag:'🇭🇺', name:'Hungary', dial:'+36'  },
      { flag:'🇬🇧', name:'United Kingdom', dial:'+44'  },
      { flag:'🇺🇸', name:'USA', dial:'+1'   },
      { flag:'🇫🇷', name:'France', dial:'+33'  },
      { flag:'🇮🇹', name:'Italy', dial:'+39'  },
      { flag:'🇪🇸', name:'Spain', dial:'+34'  },
      { flag:'🇵🇹', name:'Portugal', dial:'+351' },
      { flag:'🇳🇱', name:'Netherlands', dial:'+31'  },
      { flag:'🇧🇪', name:'Belgium', dial:'+32'  },
      { flag:'🇨🇭', name:'Switzerland', dial:'+41'  },
      { flag:'🇸🇪', name:'Sweden', dial:'+46'  },
      { flag:'🇳🇴', name:'Norway', dial:'+47'  },
      { flag:'🇩🇰', name:'Denmark', dial:'+45'  },
      { flag:'🇫🇮', name:'Finland', dial:'+358' },
      { flag:'🇷🇴', name:'Romania', dial:'+40'  },
      { flag:'🇧🇬', name:'Bulgaria', dial:'+359' },
      { flag:'🇭🇷', name:'Croatia', dial:'+385' },
      { flag:'🇸🇮', name:'Slovenia', dial:'+386' },
      { flag:'🇷🇸', name:'Serbia', dial:'+381' },
      { flag:'🇺🇦', name:'Ukraine', dial:'+380' },
      { flag:'🇷🇺', name:'Russia', dial:'+7'   },
      { flag:'🇹🇷', name:'Turkey', dial:'+90'  },
      { flag:'🇯🇵', name:'Japan', dial:'+81'  },
      { flag:'🇨🇳', name:'China', dial:'+86'  },
      { flag:'🇦🇺', name:'Australia', dial:'+61'  },
      { flag:'🇨🇦', name:'Canada', dial:'+1'   },
      { flag:'🇮🇳', name:'India', dial:'+91'  },
      { flag:'🇧🇷', name:'Brazil', dial:'+55'  },
      { flag:'🇲🇽', name:'Mexico', dial:'+52'  },
      { flag:'🇿🇦', name:'South Africa', dial:'+27'  },
      { flag:'🇳🇬', name:'Nigeria', dial:'+234' },
      { flag:'🇰🇷', name:'South Korea', dial:'+82'  },
      { flag:'🇮🇱', name:'Israel', dial:'+972' },
      { flag:'🇸🇦', name:'Saudi Arabia', dial:'+966' },
      { flag:'🇦🇪', name:'United Arab Emirates', dial:'+971' },
    ];

    let selectedCountry = countries[0];

    function renderCountries(filter = '') {
      const list = document.getElementById('countryList');
      const q = filter.toLowerCase();
      const filtered = countries.filter(c =>
        c.name.toLowerCase().includes(q) || c.dial.includes(q)
      );
      list.innerHTML = filtered.map(c => {
        const idx = countries.indexOf(c);
        const sel = c === selectedCountry ? 'selected' : '';
        return `<div class="country-option ${sel}" onclick="selectCountry(${idx})">
          <span class="opt-flag">${c.flag}</span>
          <span class="opt-name">${c.name}</span>
          <span class="opt-dial">${c.dial}</span>
        </div>`;
      }).join('');
    }

    function selectCountry(idx) {
      selectedCountry = countries[idx];
      document.getElementById('selectedFlag').textContent = selectedCountry.flag;
      document.getElementById('selectedDial').textContent = selectedCountry.dial;
      
      closeDropdown();
      renderCountries();
    }

    function toggleDropdown() {
      const dd = document.getElementById('countryDropdown');
      const btn = document.getElementById('countryBtn');
      const willOpen = !dd.classList.contains('open');
      dd.classList.toggle('open', willOpen);
      btn.classList.toggle('open', willOpen);
      if (willOpen) {
        const search = dd.querySelector('.country-search');
        search.value = '';
        renderCountries();
        setTimeout(() => search.focus(), 50);
      }
    }

    function closeDropdown() {
      document.getElementById('countryDropdown').classList.remove('open');
      document.getElementById('countryBtn').classList.remove('open');
    }

    function filterCountries(val) { renderCountries(val); }

    document.addEventListener('click', e => {
      const wrap = document.getElementById('phonePrefixWrap');
      if (wrap && !wrap.contains(e.target)) closeDropdown();
    });

    function updateInput() {
      const sel = document.getElementById('contactType').value;
      const input = document.getElementById('contactInput');
      const prefixWrap = document.getElementById('phonePrefixWrap');
      if (sel === 'instagram') {
        prefixWrap.classList.remove('visible');
        input.type = 'text';
        input.placeholder = '';
        input.value = '@';
      } else if (sel === 'email') {
        prefixWrap.classList.remove('visible');
        input.type = 'email';
        input.placeholder = ' ';
        input.value = '';
      } else {
        prefixWrap.classList.add('visible');
        input.type = 'tel';
        input.placeholder = ' ';
        input.value = '';
      }
      input.focus();
    }

    function handleSubmit() {
      const input = document.getElementById('contactInput');
      if (!input.value.trim()) { input.focus(); return; }
      document.getElementById('formHint').style.display = 'none';
      document.getElementById('successMsg').style.display = 'block';
      input.value = '';
      document.querySelectorAll('.submit-btn, .submit-btn-mobile').forEach(btn => {
        btn.textContent = '✓ Done';
        btn.style.color = 'var(--text-primary)';
      });
    }

    renderCountries();

    const contactInput = document.getElementById('contactInput');
    contactInput.addEventListener('keydown', function(e) {
      const contactType = document.getElementById('contactType').value;
      if (contactType === 'instagram') {
        if ((e.key === 'Backspace' || e.key === 'Delete') && this.selectionStart <= 1) {
          e.preventDefault();
        }
      }
    });

    contactInput.addEventListener('input', function() {
      const contactType = document.getElementById('contactType').value;
      if (contactType === 'instagram') {
        if (!this.value.startsWith('@')) {
          this.value = '@' + this.value.replace(/@/g, '');
        }
      }
    });
  </script>
</body>
</html>
